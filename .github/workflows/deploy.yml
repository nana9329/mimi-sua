name: 🚀 Deploy Mimi Sữa

on:
  push:
    branches:
      - main
      - deploy
  workflow_dispatch:

jobs:
  # ========== DEPLOY BOT TO RAILWAY ==========
  deploy-railway:
    name: Deploy Bot & API to Railway
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          railway link $RAILWAY_PROJECT_ID
          cd bot
          railway variables set FLASK_ENV=production
          railway up

      - name: Verify API Health
        run: |
          sleep 10
          API_URL="${{ secrets.RAILWAY_API_URL }}"
          curl -f "$API_URL/api/health" || exit 1
          echo "✅ API is healthy"

  # ========== DEPLOY DASHBOARD TO NETLIFY ==========
  deploy-netlify:
    name: Deploy Dashboard to Netlify
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-railway
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update API URL in dashboard
        run: |
          API_URL="${{ secrets.RAILWAY_API_URL }}"
          sed -i "s|const BOT_API_URL = .*|const BOT_API_URL = '$API_URL/api';|g" dashboard/dashboard.js
          echo "Updated API URL to: $API_URL"

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: './dashboard'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment PR with deployment info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const dashboard_url = "https://${{ secrets.NETLIFY_SITE_ID }}.netlify.app";
            const api_url = "${{ secrets.RAILWAY_API_URL }}/api";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Deployment Preview**\n\n- 📊 Dashboard: ${dashboard_url}\n- 🔌 API: ${api_url}\n- 🤖 Bot: https://t.me/Mimi_suabot`
            })

  # ========== NOTIFICATION ==========
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-railway, deploy-netlify]
    if: always()
    
    steps:
      - name: Check deployment status
        run: |
          if [[ "${{ needs.deploy-railway.result }}" == "success" && "${{ needs.deploy-netlify.result }}" == "success" ]]; then
            echo "✅ All deployments successful!"
            echo "📊 Dashboard: https://${{ secrets.NETLIFY_SITE_ID }}.netlify.app"
            echo "🔌 API: ${{ secrets.RAILWAY_API_URL }}/api"
            echo "🤖 Bot: https://t.me/Mimi_suabot"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
